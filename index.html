<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Business Card</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* RESET */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #fff; /* sfondo bianco */
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* ================= LOADER ================= */
#loader {
    position: fixed;
    inset: 0;
    background: #fff; /* sfondo bianco */
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
}

.loader-inner {
    text-align: center;
}

/* NOME */
.name {
    color: #000; /* testo nero */
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: 4px;
    opacity: 0;
    transform: translateY(12px);
    filter: blur(6px);
    animation: nameIn 1.8s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
}

/* SOTTOTITOLO */
.role {
    color: rgba(0,0,0,0.7);
    font-size: 1.5rem;
    letter-spacing: 10px; 
    margin-top: 28px; 
    opacity: 0;
    transform: translateY(10px);
    animation: roleIn 1.8s ease forwards;
    animation-delay: 1.5s;
}

/* ANIMAZIONI ENTRATA */
@keyframes nameIn {
    0% { opacity: 0; transform: translateY(12px); filter: blur(6px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
}

@keyframes roleIn {
    0% { opacity: 0; transform: translateY(10px); letter-spacing: 0px; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 10px; }
}

/* USCITA CINEMATOGRAFICA */
#loader.exit {
    opacity: 0;
    transform: scale(1.12);
    filter: blur(10px);
}

/* ================= PDF ================= */
#pdf-container {
    width: 100%;
    margin: 0;
    padding: 10px 0;
    box-sizing: border-box;
    opacity: 0;
    transform: scale(1.04);
    transition: all 1.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    background: #fff; /* sfondo bianco */
}

#pdf-container.show {
    opacity: 1;
    transform: scale(1);
}

canvas {
    display: block;
    width: 100%;
    height: auto;
    margin: 0 0 20px 0;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    background: #fff;
}

/* MOBILE */
@media (max-width:768px){
    .name { font-size: 1.8rem; letter-spacing: 2px; }
    .role { margin-top: 20px; letter-spacing: 6px; font-size: 1.3rem; }
    #pdf-container { padding: 5px; }
    canvas { margin-bottom: 10px; }
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-inner">
        <h1 class="name">GIOVANNI SANFELICE</h1>
        <p class="role">BUSINESS CARD</p>
    </div>
</div>

<!-- PDF -->
<div id="pdf-container"></div>

<script>
const url = "giovannisanfelice.pdf"; // il tuo file PDF

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const container = document.getElementById("pdf-container");

pdfjsLib.getDocument(url).promise.then(pdf => {

    // Animazione loader → PDF
    setTimeout(() => {
        document.getElementById("loader").classList.add("exit");
        document.getElementById("pdf-container").classList.add("show");
    }, 4000);

    setTimeout(() => {
        document.getElementById("loader").remove();
    }, 5500);

    // Rendering PDF
    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
        pdf.getPage(pageNumber).then(page => {
            const scale = window.innerWidth < 768 ? 2.2 : 3;
            const viewport = page.getViewport({ scale });
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            container.appendChild(canvas);
            page.render({
                canvasContext: context,
                viewport: viewport
            });
        });
    }

});
</script>

</body>
</html>
